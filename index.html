<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POP IT!</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
    <div class="container header__inner">
        <div class="logo">НЕ_ПУПЫРКА.РУ</div>

        <nav class="nav">
            <a href="#" class="nav__link">О НАС</a>
            <a href="#" class="nav__link">СКИДКИ</a>
            <a href="#" class="nav__link">КОНТАКТЫ</a>
        </nav>
    </div>
</header>


<section class="hero">

    <div class="container hero__inner">

        <div class="hero__content">

            <h1 class="hero__title">
                POP IT!
            </h1>

            <p class="hero__text">
                Лучшая игрушка-антистресс - бесконечная пупырчатая пленка!
            </p>

            <button class="button">
                КУПИТЬ
            </button>

        </div>


        <div class="hero__image">
            <img src="background.png" alt="pop it">
        </div>

    </div>

</section>



<section class="products">

<div class="container">

<h2 class="products__title">
    Выбери свой Pop-It!
</h2>


<div class="products__list">


<div class="product">

<img src="square.png" class="product__image">

<p class="product__name">
Разноцветный квадратный
</p>

<button class="button button--small">
КУПИТЬ
</button>

</div>



<div class="product">

<img src="amongus.png" class="product__image">

<p class="product__name">
Among Us, мраморный
</p>

<button class="button button--small">
КУПИТЬ
</button>

</div>



<div class="product">

<img src="round.png" class="product__image">

<p class="product__name">
Разноцветный круглый
</p>

<button class="button button--small">
КУПИТЬ
</button>

</div>


</div>

</div>

</section>




<footer class="footer">

<div class="container footer__inner">


<div class="footer__logo">
НЕ_ПУПЫРКА.РУ
</div>


<a href="#" class="footer__link">
Способы оплаты
</a>


<a href="#" class="footer__link">
Доставка
</a>


<a href="#" class="footer__link">
Опт
</a>


<a href="#" class="footer__link">
Контакты
</a>


</div>

</footer>



<script src="script.js"></script>

</body>
</html>
